services:

  mongodb:
    image: mongo:7.0
    container_name: finagent-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finagent-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finagent-backend
    ports:
      - "127.0.0.1:8001:8001"   # only accessible from localhost, not public internet
    volumes:
      - ./backend/uploads:/app/uploads
      - finagent_db:/app/db
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DATABASE_URL=sqlite:////app/db/finagent.db
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finagent-frontend
    ports:
      - "127.0.0.1:8080:80"   # proxied by host nginx
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  finagent_db:
